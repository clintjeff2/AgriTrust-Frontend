name: Lighthouse PWA Audit

on:
  push:
    branches: ["feat/pwa-offline-support", "main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundle
        run: pnpm run build

      - name: Install Lighthouse CI
        # 0.13.x ships Lighthouse 11, which still has the full PWA audit set
        # (installable-manifest, service-worker, works-offline, categories:pwa).
        # Lighthouse 12 (used by 0.14.x) removed those audits entirely.
        run: npm install -g @lhci/cli@0.13.x

      - name: Start production server & run Lighthouse CI
        run: |
          # Start Next.js production server in the background
          pnpm start &
          SERVER_PID=$!

          # Wait for the server to be ready (max 30 s)
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              break
            fi
            sleep 1
          done

          # Run Lighthouse CI — asserts PWA score >= 90 via lighthouserc.js
          lhci autorun --config=lighthouserc.js

          # Shut down the background server
          kill $SERVER_PID || true
        env:
          PORT: 3000
